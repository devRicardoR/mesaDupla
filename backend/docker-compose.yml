services:
  db:
    image: postgres:15
    container_name: mesa_dupla_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: eu1998
      POSTGRES_DB: mesaDuplaDocker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
